apiVersion: batch/v1
kind: Job
metadata:
  name: hms-init
spec:
  template:
    spec:
      containers:
        - name: hms-init
          image: apache/hive:3.1.3
          env:
            - name: SERVICE_NAME
              value: metastore
            - name: DB_DRIVER
              value: mysql
          command: ["/opt/hive/bin/schematool",  "-dbType", "mysql", "-initSchema"]
          volumeMounts:
            - mountPath: /opt/hive/lib/mysql-connector-java.jar
              name: mysql-jar
            - mountPath: /opt/hive/lib/juicefs-hadoop.jar
              name: juicefs-jar
            - mountPath: /opt/hive/conf/hive-site.xml
              name: hive-site-hms
              subPath: hive-site-hms.xml
            - mountPath: /opt/hive/conf/core-site.xml
              name: core-site
              subPath: core-site.xml
      volumes:
        - name: mysql-jar
          hostPath:
            path: MYSQL_JAR_LOCATION
            type: File
        - name: juicefs-jar
          hostPath:
            path: JUICEFS_JAR_LOCATION
            type: File
        - name: core-site
          configMap:
            name: core-site
        - name: hive-site-hms
          configMap:
            name: hive-site-hms
      restartPolicy: Never