apiVersion: apps/v1
kind: Deployment
metadata:
  name: hms
  labels:
    app: hms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hms
  template:
    metadata:
      labels:
        app: hms
    spec:
      containers:
        - name: hms
          image: apache/hive:3.1.3
          env:
            - name: SERVICE_NAME
              value: metastore
            - name: DB_DRIVER
              value: postgres
            - name: IS_RESUME
              value: "true"
          ports:
            - containerPort: 9083
          volumeMounts:
            - mountPath: /opt/hive/lib/${POSTGRESQL_CONNECTOR_JAR_NAME}
              name: ${RESOURCE_PV_NAME}
              subPath: ${POSTGRESQL_CONNECTOR_JAR_NAME}
            - mountPath: /opt/hive/lib/${JUICEFS_HADOOP_JAR_NAME}
              name: ${RESOURCE_PV_NAME}
              subPath: ${JUICEFS_HADOOP_JAR_NAME}
            - mountPath: /opt/hive/conf/hive-site.xml
              name: hive-site-hms
              subPath: hive-site-hms.xml
            - mountPath: /opt/hive/conf/core-site.xml
              name: core-site
              subPath: core-site.xml
            - mountPath: /opt/hive/conf/hdfs-site.xml
              name: hdfs-site
              subPath: hdfs-site.xml
      volumes:
        - name: ${RESOURCE_PV_NAME}
          persistentVolumeClaim:
            claimName: ${RESOURCE_PVC_NAME}
        - name: core-site
          configMap:
            name: core-site
        - name: hive-site-hms
          configMap:
            name: hive-site-hms
        - name: hdfs-site
          configMap:
            name: hdfs-site
---
apiVersion: v1
kind: Service
metadata:
  name: hms
spec:
  type: NodePort
  selector:
    app: hms
  ports:
    - protocol: TCP
      port: 9083
      targetPort: 9083
      nodePort: ${HMS_PORT}
