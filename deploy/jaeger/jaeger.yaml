apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: cr.jaegertracing.io/jaegertracing/jaeger:${JAEGER_VERSION}
        ports:
        - containerPort: 16686
          name: ui
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
spec:
  type: NodePort
  selector:
    app: jaeger
  ports:
  - name: ui
    protocol: TCP
    port: 16686
    targetPort: 16686
    nodePort: ${JAEGER_UI_PORT}
  - name: otlp-grpc
    protocol: TCP
    port: 4317
    targetPort: 4317
    nodePort: ${JAEGER_OTLP_GRPC_PORT}
  - name: otlp-http
    protocol: TCP
    port: 4318
    targetPort: 4318
    nodePort: ${JAEGER_OTLP_HTTP_PORT}
