Configuration:
  status: warn
  name: SQLRecLogConfig
  properties:
    property:
      name: log.level
      value: info
  Appenders:
    Console:
      name: ConsoleAppender
      target: SYSTEM_OUT
      PatternLayout:
        pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n"
  Loggers:
    Root:
      level: ${sys:log.level:-INFO}
      AppenderRef:
        ref: ConsoleAppender
